  <!-- Google Analytics (configure via VITE_GA_ID; skipped if unset) -->
  <script type="module">
    const gaId = import.meta.env.VITE_GA_ID;
    if (gaId && gaId !== 'G-XXXXXXXXXX') {
      const gaScript = document.createElement('script');
      gaScript.async = true;
      gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${gaId}`;
      document.head.appendChild(gaScript);

      window.dataLayer = window.dataLayer || [];
      window.gtag = function gtag() { window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', gaId);
    } else {
      console.warn('Google Analytics ID (VITE_GA_ID) not set; skipping GA initialization.');
    }
  </script>

<body>
  <div id="root"></div>
  <script>
    // 🔧 修复: 只清除语言相关的缓存，保留认证信息
    // 之前使用 localStorage.clear() 会清除所有数据，包括token，导致登录后立即失效
    try {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        // 只清除语言相关的key，保留认证相关的key
        if (key && (key.startsWith('i18next') || key === 'userLanguage')) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(key => localStorage.removeItem(key));
      void keysToRemove;
    } catch (error) {
      console.error('清除语言缓存失败:', error);
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
