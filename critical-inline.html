<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS优化示例 - 内联关键CSS</title>

    <!-- 内联关键CSS -->
    <style>
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Oxygen','Ubuntu','Cantarell','Fira Sans','Droid Sans','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;background-color:#ffffff;color:#1f2937;}.no-js #app{display:none;}.js #app{display:block;}.app-container{min-height:100vh;display:flex;flex-direction:column;}.main-content{flex:1;position:relative;}.nav-header{height:64px;position:fixed;top:0;left:0;right:0;z-index:50;background-color:white;border-bottom:1px solid #e5e7eb;}.nav-placeholder{height:64px;width:100%;}.page-container{max-width:1200px;margin:0 auto;padding:1rem 1.5rem;min-height:calc(100vh - 128px);}.btn-primary{display:inline-flex;align-items:center;justify-content:center;padding:0.5rem 1rem;border-radius:0.375rem;background-color:#2563eb;color:white;font-weight:500;text-decoration:none;border:none;cursor:pointer;transition:background-color 0.2s ease;}.btn-primary:hover{background-color:#1d4ed8;}.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}.responsive-image{display:block;width:100%;height:auto;object-fit:cover;background-color:#f3f4f6;}.image-container{position:relative;overflow:hidden;}.loading-skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);background-size:200% 100%;animation:skeleton-loading 1.5s infinite;}@keyframes skeleton-loading{0%{background-position:200% 0;}100%{background-position:-200% 0;}}h1{font-size:2.25rem;font-weight:700;line-height:1.2;margin:1rem 0;color:#111827;}h2{font-size:1.875rem;font-weight:600;line-height:1.3;margin:0.75rem 0;color:#111827;}h3{font-size:1.5rem;font-weight:600;line-height:1.4;margin:0.5rem 0;color:#111827;}p{font-size:1rem;line-height:1.6;color:#374151;margin:0.75rem 0;}@media (max-width:768px){.page-container{padding:0.75rem 1rem;}h1{font-size:1.875rem;}h2{font-size:1.5rem;}h3{font-size:1.25rem;}.nav-header{height:56px;}.nav-placeholder{height:56px;}}.gpu-accelerated{transform:translateZ(0);will-change:transform;}.lazy-styles{opacity:0;transition:opacity 0.3s ease;}.styles-loaded .lazy-styles{opacity:1;}.error-message{color:#dc2626;background-color:#fef2f2;border:1px solid #fecaca;border-radius:0.375rem;padding:0.75rem;margin:0.5rem 0;}.success-message{color:#059669;background-color:#f0fdf4;border:1px solid #bbf7d0;border-radius:0.375rem;padding:0.75rem;margin:0.5rem 0;}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}.focus-visible{outline:2px solid #2563eb;outline-offset:2px;}@media (prefers-contrast:high){body{background-color:white;color:black;}.btn-primary{border:2px solid black;}}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;scroll-behavior:auto !important;}}
    </style>

    <!-- 预加载非关键CSS -->
    <link rel="preload" href="/css/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/css/index.css"></noscript>

    <!-- 其他性能优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.example.com">
</head>
<body>
    <div class="app-container">
        <header class="nav-header">
            <h1>CSS优化示例</h1>
        </header>

        <div class="nav-placeholder"></div>

        <main class="main-content">
            <div class="page-container">
                <h1>关键CSS内联示例</h1>
                <p>这个页面展示了如何通过内联关键CSS来优化页面加载性能。</p>

                <div class="image-container">
                    <img src="/images/example.jpg" alt="示例图片" class="responsive-image loading-skeleton">
                </div>

                <button class="btn-primary">主要按钮</button>

                <h2>性能优化效果</h2>
                <ul>
                    <li>减少首屏渲染时间 300-500ms</li>
                    <li>降低布局偏移风险</li>
                    <li>提升用户感知性能</li>
                    <li>改善Core Web Vitals指标</li>
                </ul>
            </div>
        </main>
    </div>

    <!-- 性能监控脚本 -->
    <script>
        // Web Vitals监控
        function trackWebVitals() {
            if ('PerformanceObserver' in window) {
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        console.log('Performance Entry:', entry.name, entry.value);
                    }
                });

                observer.observe({ entryTypes: ['largest-contentful-paint', 'layout-shift'] });
            }
        }

        // 页面加载完成后启动监控
        if (document.readyState === 'complete') {
            trackWebVitals();
        } else {
            window.addEventListener('load', trackWebVitals);
        }
    </script>
</body>
</html>
